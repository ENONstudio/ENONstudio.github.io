<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ENÖN Games</title>
  <style>
    :root {
      --bg: #0b1e3a;
      --card: rgba(20, 44, 84, 0.85);
      --text: #e6edf3;
      --sub: #9fb3c8;
      --line: rgba(255, 255, 255, 0.08);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-hover: 0 14px 32px rgba(0, 0, 0, 0.7);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, #10264a 0%, #0b1e3a 50%, #071426 100%);
      color: var(--text);
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 18px 72px;
    }

    .hero {
      text-align: center;
      padding: 32px 16px 28px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(34px, 8vw, 60px);
      margin: 0 0 12px;
      letter-spacing: 0.08em;
    }

    .tagline {
      font-size: clamp(16px, 3.5vw, 20px);
      color: var(--sub);
      margin: 0 auto;
      max-width: 560px;
      line-height: 1.7;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      min-height: 250px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .thumb {
      aspect-ratio: 16 / 10;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        linear-gradient(45deg, #0f2a4d, #0b1e3a);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .game-title {
      font-size: 21px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .game-desc {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 18px;
    }

    .play-row {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    footer {
      margin-top: 52px;
      text-align: center;
      font-size: 13px;
      color: var(--sub);
    }

    @media (max-width: 640px) {
      .game-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
