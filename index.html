<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ENÖN</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 40px;
      margin: 0 0 12px;
      letter-spacing: 0.08em;
    }

    .tagline {
      font-size: 18px;
      color: #666;
      margin: 0;
    }

    .section-title {
      font-size: 22px;
      margin: 0 0 20px;
    }

    .game-list {
      display: grid;
      gap: 16px;
    }

    .game-card {
      display: block;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      text-decoration: none;
      color: #222;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .game-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    .game-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .game-desc {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }

    footer {
      margin-top: 56px;
      text-align: center;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>ENÖN</h1>
      <p class="tagline">Play. Imagine. Discover.</p>
    </header>

    <main>
      <h2 class="section-title">Games</h2>

      <div class="game-list">
        <a class="game-card" href="#">
          <div class="game-title">テスト</div>
          <div class="game-desc">
            テスト画面です
          </div>
        </a>
      </div>
    </main>

    <footer>
      © ENÖN
    </footer>
  </div>
</body>
</html>
